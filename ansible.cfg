[defaults]
# inventory is generated by the meridian CLI at runtime
remote_user = root
host_key_checking = False
# Single host deployment — no multiprocessing needed.
# Also avoids /dev/shm errors on macOS (no shared memory support).
forks = 1
retry_files_enabled = False
timeout = 30
deprecation_warnings = False
inject_facts_as_vars = True
# Required for body_format: json — ensures {{ port | int }} returns a native
# integer, not a string. Safe with mixed text+expression templates (settings/
# streamSettings >- blocks) because NativeEnvironment only returns native types
# for single-expression templates like {{ x }}, not mixed content.
jinja2_native = True
# Don't wrap debug output in YAML/JSON — let ANSI codes and newlines render naturally
stdout_callback = ansible.builtin.default
display_skipped_hosts = False

# Speed up SSH connections
[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

---
# Caddy Web Server (domain mode only)
# Handles TLS termination, decoy website, WebSocket proxy for VLESS+WSS,
# 3x-ui panel proxy, and the connection info page.
# Receives traffic from HAProxy on the internal port.
#
# Config strategy: Meridian writes its config to /etc/caddy/conf.d/meridian.caddy
# and ensures the main Caddyfile imports /etc/caddy/conf.d/*. This way the user's
# own Caddyfile is never overwritten — they can add their own site blocks freely.

# -- Pre-flight: check that the domain resolves to this server --
- name: Resolve domain DNS to check it points to this server
  ansible.builtin.command:
    cmd: "dig +short {{ domain }} @8.8.8.8"
  register: domain_dns_check
  changed_when: false
  failed_when: false

- name: Fail if domain does not resolve to this server
  ansible.builtin.fail:
    msg: |
      {{ domain }} does not resolve to this server's IP ({{ server_public_ip }}).
      DNS returned: {{ domain_dns_check.stdout | default('(empty)') }}

      Caddy needs the domain to point DIRECTLY to this server for TLS certificates.

      Fix: In Cloudflare, set the A record to "DNS only" (grey cloud), then re-run.
      After the playbook succeeds, switch to "Proxied" (orange cloud).

      To skip this check: add -e skip_dns_check=true
  when:
    - not (skip_dns_check | default(false) | bool)
    - domain_dns_check.stdout | default('') | trim != server_public_ip
    - domain_dns_check.stdout | default('') | trim != ''

- name: Install Caddy prerequisites
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
      - dnsutils
    state: present

- name: Add Caddy GPG key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy-stable.asc
    mode: "0644"

- name: Add Caddy apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/caddy-stable.asc]
      https://dl.cloudsmith.io/public/caddy/stable/deb/debian
      any-version main
    filename: caddy-stable
    state: present

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true

- name: Create web and config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: caddy
    group: caddy
  loop:
    - /var/www/html
    - /var/www/private
    - /var/log/caddy
    - /etc/caddy/conf.d

- name: Deploy Meridian Caddy config
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/conf.d/meridian.caddy
    mode: "0644"
  notify: Reload Caddy

- name: Ensure main Caddyfile imports conf.d
  ansible.builtin.lineinfile:
    path: /etc/caddy/Caddyfile
    line: "import /etc/caddy/conf.d/*.caddy"
    create: true
    mode: "0644"
  notify: Reload Caddy

- name: Ensure Caddy is started and enabled
  ansible.builtin.service:
    name: caddy
    state: started
    enabled: true

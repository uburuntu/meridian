---
# Final output: display connection info, QR codes, and save files locally.
# This role always runs (both domain and no-domain mode).

# -- Build connection URLs --
- name: Build Reality VLESS connection URL
  ansible.builtin.set_fact:
    vless_reality_url: >-
      vless://{{ reality_uuid }}@{{ server_public_ip }}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ reality_sni }}&fp={{ utls_fingerprint }}&pbk={{ reality_public_key }}&sid={{ reality_short_id }}&type=tcp&headerType=none#VLESS-Reality

- name: Build WSS VLESS connection URL (domain mode)
  ansible.builtin.set_fact:
    vless_wss_url: >-
      vless://{{ wss_uuid }}@{{ domain }}:443?encryption=none&security=tls&sni={{ domain }}&type=ws&host={{ domain }}&path=%2F{{ ws_path }}#VLESS-WSS-CDN
  when: domain_mode | bool

- name: Set empty WSS URL for no-domain mode
  ansible.builtin.set_fact:
    vless_wss_url: ""
  when: not (domain_mode | bool)

- name: Build direct Reality fallback URL (exit mode)
  ansible.builtin.set_fact:
    vless_direct_url: >-
      vless://{{ reality_uuid }}@{{ server_public_ip }}:{{ reality_direct_port | default(8444) }}?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ reality_sni }}&fp={{ utls_fingerprint }}&pbk={{ reality_public_key }}&sid={{ reality_short_id }}&type=tcp&headerType=none#VLESS-Direct-Fallback
  when: exit_mode | default(false) | bool

# -- Generate QR codes in terminal --
- name: Generate Reality QR code for terminal display
  ansible.builtin.command:
    cmd: "qrencode -t ANSIUTF8 '{{ vless_reality_url }}'"
  register: reality_qr_terminal
  changed_when: false
  delegate_to: localhost
  become: false

- name: Generate WSS QR code for terminal display
  ansible.builtin.command:
    cmd: "qrencode -t ANSIUTF8 '{{ vless_wss_url }}'"
  register: wss_qr_terminal
  changed_when: false
  delegate_to: localhost
  become: false
  when: domain_mode | bool

# -- Generate QR codes as base64 PNGs for HTML file --
- name: Generate Reality QR code as base64 PNG
  ansible.builtin.shell:
    cmd: "printf '%s' '{{ vless_reality_url }}' | qrencode -t PNG -o - -s 6 | base64 | tr -d '\\n'"
  register: reality_qr_b64_local
  changed_when: false
  delegate_to: localhost
  become: false

- name: Generate WSS QR code as base64 PNG
  ansible.builtin.shell:
    cmd: "printf '%s' '{{ vless_wss_url }}' | qrencode -t PNG -o - -s 6 | base64 | tr -d '\\n'"
  register: wss_qr_b64_local
  changed_when: false
  delegate_to: localhost
  become: false
  when: domain_mode | bool

# -- Save files locally (before noisy terminal output) --
- name: Save connection summary to local file
  ansible.builtin.template:
    src: connection-summary.txt.j2
    dest: "{{ credentials_dir }}/{{ inventory_hostname }}-connection-info.txt"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: Save connection info HTML page locally
  ansible.builtin.template:
    src: connection-info.html.j2
    dest: "{{ credentials_dir }}/{{ inventory_hostname }}-connection-info.html"
    mode: "0600"
  delegate_to: localhost
  become: false

# -- Flush handlers so HAProxy/Caddy are running before port check --
- name: Flush handlers before port verification
  ansible.builtin.meta: flush_handlers

# -- Verify the proxy is actually listening --
- name: Verify port 443 is listening
  ansible.builtin.command:
    cmd: ss -tlnp sport = :443
  register: port_443_check
  changed_when: false

- name: Verify Reality port is listening (exit mode fallback)
  ansible.builtin.command:
    cmd: "ss -tlnp sport = :{{ reality_direct_port | default(8444) }}"
  register: port_direct_check
  changed_when: false
  when: exit_mode | default(false) | bool

# -- Print output directly to terminal (bypasses Ansible's JSON-escaping) --
# Using shell echo instead of debug so ANSI QR codes render properly.

- name: Display QR codes and connection summary
  ansible.builtin.shell:
    cmd: |
      printf '\n'
      printf '%s\n' '{{ reality_qr_terminal.stdout | replace("'", "'\\''") }}'
      {% if domain_mode | bool %}
      printf '\n'
      printf '%s\n' '{{ wss_qr_terminal.stdout | replace("'", "'\\''") }}'
      {% endif %}
      printf '\n'
      cat <<'SUMMARY'

      ======================================================================
                        CONNECTION SETUP COMPLETE
      ======================================================================

      --- Verification ---
      Port 443: {{ 'OK' if '*:443' in port_443_check.stdout or '0.0.0.0:443' in port_443_check.stdout or ':::443' in port_443_check.stdout else 'NOT LISTENING — run: docker logs 3x-ui' }}
      {% if exit_mode | default(false) | bool %}
      Port {{ reality_direct_port | default(8444) }}: {{ 'OK' if port_direct_check.stdout | length > 50 else 'NOT LISTENING' }}
      {% endif %}

      --- Connection URLs ---
      {% if exit_mode | default(false) | bool %}
      Direct fallback (port {{ reality_direct_port | default(8444) }}):
      {{ vless_direct_url }}
      {% else %}
      Primary (Reality, port 443):
      {{ vless_reality_url }}
      {% endif %}
      {% if domain_mode | bool %}

      CDN fallback (WSS via {{ domain }}):
      {{ vless_wss_url }}
      {% endif %}
      {% if domain_mode | bool %}

      --- Connection Info Page ---
      https://{{ domain }}/{{ info_page_path }}
      (Share this link — has QR codes, copy buttons, setup instructions)
      {% endif %}

      --- Files Saved ---
      HTML page: {{ credentials_dir }}/{{ inventory_hostname }}-connection-info.html
      Text file: {{ credentials_dir }}/{{ inventory_hostname }}-connection-info.txt
      Credentials: {{ credentials_file }}
      {% if domain_mode | bool %}

      --- Cloudflare Setup (for CDN fallback) ---
      Now switch the DNS record to Proxied (orange cloud), then:
      1. SSL/TLS → Full (Strict)
      2. Network → Enable WebSockets
      3. SSL/TLS → Edge Certificates → disable "Always Use HTTPS"
         (or add Page Rule: /.well-known/acme-challenge/* → disable HTTPS)
      The TLS certificate renews automatically every 90 days.
      Renewals work through Cloudflare as long as HTTP port 80 is not
      redirected to HTTPS by Cloudflare before reaching the server.
      {% endif %}

      --- 3x-ui Panel ---
      {% if domain_mode | bool %}
      URL:      https://{{ domain }}/{{ panel_web_base_path }}/
      {% else %}
      Access via SSH tunnel (panel is localhost-only):
        ssh -L {{ panel_internal_port }}:127.0.0.1:{{ panel_internal_port }} root@{{ server_public_ip }}
        Then open: http://127.0.0.1:{{ panel_internal_port }}/{{ panel_web_base_path }}/
      {% endif %}
      Username: {{ panel_username }}
      Password: {{ panel_password }}

      ======================================================================
      {% if exit_mode | default(false) | bool %}

      --- Exit Node Credentials (for Relay Configuration) ---
      These values are automatically passed to the relay node.
      XHTTP UUID:    {{ xhttp_uuid }}
      Public Key:    {{ reality_public_key }}
      Short ID:      {{ reality_short_id }}
      Reality SNI:   {{ reality_sni }}
      Server IP:     {{ server_public_ip }}
      {% endif %}
      SUMMARY
  delegate_to: localhost
  become: false
  changed_when: false

---
# Create the VLESS+Reality+XHTTP inbound.
#
# Used in two modes:
# - Exit mode (chain): relay node connects here. Uses xhttp_uuid, email xhttp-relay-user.
# - Standalone (--xhttp): end users connect directly. Uses reality_uuid, same identity as TCP Reality.
#
# XHTTP mimics standard HTTP traffic, making connections statistically
# indistinguishable from normal browsing (post-handshake behavioral stealth).

- name: Check if VLESS-Reality-XHTTP inbound already exists
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ panel_internal_port }}/{{ panel_web_base_path }}/panel/api/inbounds/list"
    method: GET
    headers:
      Cookie: "{{ session_cookie }}"
    return_content: true
  register: inbounds_list_xhttp

- name: Find existing XHTTP Reality inbound
  ansible.builtin.set_fact:
    xhttp_inbound_match: "{{ inbounds_list_xhttp.json.obj | default([]) | selectattr('remark', 'equalto', 'VLESS-Reality-XHTTP') | list }}"

- name: Set XHTTP inbound status
  ansible.builtin.set_fact:
    xhttp_inbound_exists: "{{ xhttp_inbound_match | length > 0 }}"

# Compute which port XHTTP should use:
# - Exit mode (chain): port 443 (Reality TCP is on 8444, no conflict)
# - Standalone: dedicated xhttp_port (Reality TCP already owns 443)
- name: Compute XHTTP inbound port
  ansible.builtin.set_fact:
    xhttp_inbound_port: "{{ (exit_mode | default(false) | bool) | ternary(443, xhttp_port) }}"

# In exit mode: use dedicated xhttp_uuid for relay connections
# In standalone mode: use reality_uuid so users have one identity for both transports
- name: Set XHTTP client identity
  ansible.builtin.set_fact:
    xhttp_client_uuid: "{{ xhttp_uuid if (exit_mode | default(false) | bool) else reality_uuid }}"
    xhttp_client_email: "{{ 'xhttp-relay-user' if (exit_mode | default(false) | bool) else 'xhttp-' + (first_client_name | default('default')) }}"

- name: Create VLESS+Reality+XHTTP inbound
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ panel_internal_port }}/{{ panel_web_base_path }}/panel/api/inbounds/add"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
    body_format: json
    body:
      remark: "VLESS-Reality-XHTTP"
      enable: true
      port: "{{ xhttp_inbound_port | int }}"
      protocol: "vless"
      expiryTime: 0
      total: 0
      settings: >-
        {
          "clients": [{
            "id": "{{ xhttp_client_uuid }}",
            "flow": "",
            "email": "{{ xhttp_client_email }}",
            "limitIp": {{ client_limit_ip | default(2) }},
            "totalGB": {{ client_total_bytes | default(0) }},
            "expiryTime": 0,
            "enable": true,
            "tgId": "",
            "subId": "",
            "reset": 0
          }],
          "decryption": "none",
          "fallbacks": []
        }
      streamSettings: >-
        {
          "network": "xhttp",
          "security": "reality",
          "externalProxy": [],
          "realitySettings": {
            "show": false,
            "xver": 0,
            "dest": "{{ reality_dest }}",
            "serverNames": ["{{ reality_sni }}"],
            "privateKey": "{{ reality_private_key }}",
            "minClient": "",
            "maxClient": "",
            "maxTimediff": 0,
            "shortIds": ["{{ reality_short_id }}"],
            "settings": {
              "publicKey": "{{ reality_public_key }}",
              "fingerprint": "{{ utls_fingerprint }}",
              "serverName": "",
              "spiderX": "/"
            }
          },
          "xhttpSettings": {
            "mode": "{{ xhttp_mode | default('packet-up') }}",
            "path": "{{ xhttp_path | default('/') }}"
          }
        }
      sniffing: >-
        {
          "enabled": true,
          "destOverride": ["http", "tls", "quic", "fakedns"],
          "metadataOnly": false,
          "routeOnly": false
        }
    status_code: [200]
    return_content: true
  register: xhttp_create_result
  when: not (xhttp_inbound_exists | bool)

- name: Verify XHTTP Reality inbound was created successfully
  ansible.builtin.assert:
    that: xhttp_create_result.json.success | default(false)
    fail_msg: >-
      Failed to create XHTTP Reality inbound: {{ xhttp_create_result.json.msg | default('unknown error') }}.
      This usually means a previous install left a corrupted database.
      Fix: run 'meridian uninstall {{ server_public_ip }}' then retry setup.
      If the problem persists, open an issue: https://github.com/uburuntu/meridian/issues
  when: not (xhttp_inbound_exists | bool)

- name: Show XHTTP Reality inbound status
  ansible.builtin.debug:
    msg: >-
      {{ 'VLESS+Reality+XHTTP inbound created on port ' + (xhttp_inbound_port | string)
      if not (xhttp_inbound_exists | bool)
      else 'VLESS+Reality+XHTTP inbound already exists — skipping' }}

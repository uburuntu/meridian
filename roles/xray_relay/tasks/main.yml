---
# Relay node Xray configuration:
# 1. Deploy 3x-ui container
# 2. Configure panel credentials
# 3. Create user-facing VLESS+TCP inbound (no TLS — domestic leg)
# 4. Configure outbound chain to exit node + routing rules

- name: Deploy 3x-ui container
  ansible.builtin.import_tasks: deploy.yml

- name: Configure panel credentials
  ansible.builtin.import_tasks: configure_panel.yml

- name: Create user-facing inbound
  ansible.builtin.import_tasks: configure_inbound.yml

- name: Configure outbound chain to exit node
  ansible.builtin.import_tasks: configure_outbound.yml

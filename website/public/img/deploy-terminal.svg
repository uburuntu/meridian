<svg xmlns="http://www.w3.org/2000/svg" width="720" height="780" viewBox="0 0 720 780">
  <defs>
    <style>
      .t { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace; font-size: 13px; }
      .tb { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace; font-size: 13px; font-weight: 700; }
      .g { fill: #a6e3a1; }
      .c { fill: #89dceb; }
      .w { fill: #cdd6f4; }
      .bw { fill: #ffffff; }
      .d { fill: #6c7086; }
    </style>
  </defs>

  <!-- Window chrome -->
  <rect width="720" height="780" rx="10" ry="10" fill="#1e1e2e"/>
  <rect width="720" height="36" rx="10" ry="10" fill="#313244"/>
  <rect y="26" width="720" height="10" fill="#313244"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="23" text-anchor="middle" class="t d">meridian deploy — 198.51.100.42</text>

  <g transform="translate(24, 56)">
    <!-- Prompt -->
    <text y="0" class="t d">$</text>
    <text x="16" y="0" class="tb bw">meridian deploy 198.51.100.42 --yes</text>

    <!-- Header -->
    <text x="0" y="32" class="tb w">  Meridian</text>
    <text x="90" y="32" class="t d">v3.6.0</text>

    <!-- Config -->
    <text x="0" y="60" class="t c">  → Configuring server at 198.51.100.42...</text>
    <text x="0" y="78" class="t c">  → XHTTP: enabled (enhanced stealth)</text>

    <!-- Steps -->
    <text x="0" y="108" class="t g">  ✓</text><text x="28" y="108" class="t w">Install system packages</text><text x="280" y="108" class="t d">(all packages present)</text>
    <text x="0" y="128" class="t g">  ✓</text><text x="28" y="128" class="t w">Enable automatic security updates</text><text x="310" y="128" class="t d">(already configured)</text>
    <text x="0" y="148" class="t g">  ✓</text><text x="28" y="148" class="t w">Set timezone to UTC</text><text x="210" y="148" class="t d">(already UTC)</text>
    <text x="0" y="168" class="t g">  ✓</text><text x="28" y="168" class="t w">Harden SSH configuration</text><text x="255" y="168" class="t d">(already hardened)</text>
    <text x="0" y="188" class="t g">  ✓</text><text x="28" y="188" class="t w">Enable BBR congestion control</text><text x="290" y="188" class="t d">(already enabled)</text>
    <text x="0" y="208" class="t g">  ✓</text><text x="28" y="208" class="t w">Configure firewall</text>
    <text x="0" y="228" class="t g">  ✓</text><text x="28" y="228" class="t w">Install Docker</text><text x="165" y="228" class="t d">(docker-ce already installed)</text>
    <text x="0" y="248" class="t g">  ✓</text><text x="28" y="248" class="t w">Deploy 3x-ui panel</text>
    <text x="0" y="268" class="t g">  ✓</text><text x="28" y="268" class="t w">Configure panel</text><text x="170" y="268" class="t d">(credentials saved)</text>
    <text x="0" y="288" class="t g">  ✓</text><text x="28" y="288" class="t w">Log in to panel</text><text x="170" y="288" class="t d">(port 2053)</text>
    <text x="0" y="308" class="t g">  ✓</text><text x="28" y="308" class="t w">Create Reality inbound</text><text x="230" y="308" class="t d">(port 10443)</text>
    <text x="0" y="328" class="t g">  ✓</text><text x="28" y="328" class="t w">Create XHTTP inbound</text><text x="225" y="328" class="t d">(127.0.0.1:12345)</text>
    <text x="0" y="348" class="t g">  ✓</text><text x="28" y="348" class="t w">Verify Xray configuration</text><text x="260" y="348" class="t d">(Xray running)</text>
    <text x="0" y="368" class="t g">  ✓</text><text x="28" y="368" class="t w">Install HAProxy</text><text x="170" y="368" class="t d">(SNI routing configured)</text>
    <text x="0" y="388" class="t g">  ✓</text><text x="28" y="388" class="t w">Install Caddy</text><text x="150" y="388" class="t d">(TLS on 198.51.100.42:8443)</text>
    <text x="0" y="408" class="t g">  ✓</text><text x="28" y="408" class="t w">Deploy connection page</text><text x="230" y="408" class="t d">(live)</text>

    <!-- Success -->
    <text x="0" y="440" class="tb g">  ✓ All steps completed successfully</text>

    <!-- Done block -->
    <text x="0" y="472" class="tb g">  Done!</text>
    <text x="0" y="498" class="t g">  ✓</text><text x="28" y="498" class="t w">Your proxy server is live and ready to use.</text>

    <!-- Next steps -->
    <text x="0" y="530" class="tb bw">  Next steps:</text>

    <text x="0" y="558" class="t g">  1.</text>
    <text x="32" y="558" class="t w">Share this link with whoever needs access:</text>
    <text x="32" y="578" class="tb c">     https://198.51.100.42/xxxxxxxx/.../</text>
    <text x="32" y="596" class="t d">     (They open it, scan the QR code, and connect)</text>

    <text x="0" y="626" class="t g">  3.</text>
    <text x="32" y="626" class="t w">Test that the proxy works:</text>
    <text x="32" y="646" class="tb c">     meridian test 198.51.100.42</text>

    <text x="0" y="676" class="t g">  4.</text>
    <text x="32" y="676" class="t w">Share access with friends:</text>
    <text x="32" y="696" class="tb c">     meridian client add alice</text>
  </g>
</svg>

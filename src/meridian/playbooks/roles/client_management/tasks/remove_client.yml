---
# Remove a client from existing inbound(s) and clean up local files.
# Note: 3x-ui delClient API requires the client UUID, not the email.
#
# Uses inbound_types from group_vars/all.yml to loop over protocols.

# -- Validate input --
- name: Validate client name is provided
  ansible.builtin.assert:
    that:
      - client_name is defined
      - client_name | length > 0
    fail_msg: "client_name is required. Usage: meridian client remove NAME"

# -- Verify client exists in Reality inbound (canonical) --
- name: Find Reality client by email
  ansible.builtin.set_fact:
    reality_client_match: "{{ reality_clients | selectattr('email', 'equalto', 'reality-' + client_name) | list }}"

- name: Fail if client does not exist
  ansible.builtin.fail:
    msg: "Client '{{ client_name }}' not found. Use: meridian client list"
  when: reality_client_match | length == 0

# -- Build lookup dicts for the loop --
- name: Build inbound lookup for removal
  ansible.builtin.set_fact:
    _inbound_ids:
      reality: "{{ reality_inbound_id }}"
      wss: "{{ wss_inbound_id | default('') }}"
      xhttp: "{{ xhttp_inbound_id | default('') }}"
    _inbound_clients:
      reality: "{{ reality_clients | default([]) }}"
      wss: "{{ wss_clients | default([]) }}"
      xhttp: "{{ xhttp_clients | default([]) }}"

# -- Remove client from each active inbound --
- name: "Remove client from {{ _inbound.key }} inbound"
  ansible.builtin.include_tasks: _remove_client_from_inbound.yml
  loop: "{{ inbound_types }}"
  loop_control:
    loop_var: _inbound
  when: _inbound_ids[_inbound.key] | default('') | length > 0

# -- Update clients in main credentials file --
- name: Load existing credentials file
  ansible.builtin.include_vars:
    file: "{{ credentials_file }}"
    name: main_creds
  delegate_to: localhost
  become: false
  failed_when: false

- name: Save updated credentials (without removed client)
  ansible.builtin.copy:
    content: |
      ---
      # Auto-generated credentials — DO NOT share.
      version: 2
      panel_configured: true
      panel:
        username: "{{ panel_username }}"
        password: "{{ panel_password }}"
        web_base_path: "{{ panel_web_base_path }}"
        info_page_path: "{{ info_page_path | default('') }}"
        port: {{ panel_internal_port }}
      server:
        ip: "{{ server_public_ip }}"
        domain: "{{ domain | default('') }}"
        sni: "{{ reality_sni }}"
      protocols:
        reality:
          uuid: "{{ reality_uuid }}"
          private_key: "{{ reality_private_key }}"
          public_key: "{{ reality_public_key }}"
          short_id: "{{ reality_short_id }}"
        wss:
          uuid: "{{ wss_uuid | default('') }}"
          ws_path: "{{ ws_path | default('') }}"
      clients:
      {% for c in (main_creds.clients | default([])) if c.name != client_name %}
        - name: "{{ c.name }}"
          added: "{{ c.added }}"
          reality_uuid: "{{ c.reality_uuid }}"
          wss_uuid: "{{ c.wss_uuid | default('') }}"
      {% endfor %}
    dest: "{{ credentials_file }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  when: main_creds is defined and main_creds.clients is defined

# -- Delete local output files --
- name: Remove client HTML file
  ansible.builtin.file:
    path: "{{ credentials_dir }}/{{ inventory_hostname }}-{{ client_name }}-connection-info.html"
    state: absent
  delegate_to: localhost
  become: false

- name: Remove client text file
  ansible.builtin.file:
    path: "{{ credentials_dir }}/{{ inventory_hostname }}-{{ client_name }}-connection-info.txt"
    state: absent
  delegate_to: localhost
  become: false

# -- Confirmation --
- name: Display removal confirmation
  ansible.builtin.debug:
    msg: "Client '{{ client_name }}' has been removed from all active inbounds."

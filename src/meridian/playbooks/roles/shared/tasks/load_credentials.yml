---
# Shared pre-task: load saved credentials for idempotent re-runs.
# Used by playbook.yml.
#
# Required variables:
#   - credentials_dir, credentials_file
#
# Optional variables to apply (set by caller):
#   - credential_fields (list of field names to apply as facts)

- name: Create local credentials directory
  ansible.builtin.file:
    path: "{{ credentials_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Check if credentials file exists
  ansible.builtin.stat:
    path: "{{ credentials_file }}"
  register: creds_file_stat
  delegate_to: localhost
  become: false

- name: Load saved credentials from previous run
  ansible.builtin.include_vars:
    file: "{{ credentials_file }}"
    name: saved_creds
  when: creds_file_stat.stat.exists

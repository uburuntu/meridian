---
# Shared output generation for a single client.
# Used by the output role (initial setup) and client_management role (add-client).
#
# Required variables:
#   - client_reality_uuid, client_wss_uuid — UUIDs for this client
#   - client_name — used in filenames and URL fragment
#   - server_public_ip, reality_sni, utls_fingerprint, reality_public_key, reality_short_id
#   - domain_mode, credentials_dir, inventory_hostname
#   - domain, ws_path (if domain_mode)

# -- Build connection URLs --
- name: "Build Reality VLESS URL for {{ client_name }}"
  ansible.builtin.set_fact:
    vless_reality_url: >-
      vless://{{ client_reality_uuid }}@{{ server_public_ip }}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ reality_sni }}&fp={{ utls_fingerprint }}&pbk={{ reality_public_key }}&sid={{ reality_short_id }}&type=tcp&headerType=none#{{ client_name }}

- name: "Build Reality+XHTTP VLESS URL for {{ client_name }}"
  ansible.builtin.set_fact:
    vless_xhttp_url: >-
      vless://{{ client_reality_uuid }}@{{ server_public_ip }}:{{ xhttp_inbound_port }}?encryption=none&security=reality&sni={{ reality_sni }}&fp={{ utls_fingerprint }}&pbk={{ reality_public_key }}&sid={{ reality_short_id }}&type=xhttp&mode={{ xhttp_mode | default('packet-up') }}&path=%2F#{{ client_name }}-XHTTP
  when: xhttp_enabled | default(false) | bool

- name: Set empty XHTTP URL when disabled
  ansible.builtin.set_fact:
    vless_xhttp_url: ""
  when: not (xhttp_enabled | default(false) | bool)

- name: "Build WSS VLESS URL for {{ client_name }}"
  ansible.builtin.set_fact:
    vless_wss_url: >-
      vless://{{ client_wss_uuid }}@{{ domain }}:443?encryption=none&security=tls&sni={{ domain }}&type=ws&host={{ domain }}&path=%2F{{ ws_path }}#{{ client_name }}-WSS
  when: domain_mode | bool

- name: Set empty WSS URL for no-domain mode
  ansible.builtin.set_fact:
    vless_wss_url: ""
  when: not (domain_mode | bool)

# -- Generate QR codes for terminal --
- name: "Generate Reality QR code for terminal ({{ client_name }})"
  ansible.builtin.command:
    cmd: "qrencode -t ANSIUTF8 '{{ vless_reality_url }}'"
  register: reality_qr_terminal
  changed_when: false
  delegate_to: localhost
  become: false

- name: "Generate XHTTP QR code for terminal ({{ client_name }})"
  ansible.builtin.command:
    cmd: "qrencode -t ANSIUTF8 '{{ vless_xhttp_url }}'"
  register: xhttp_qr_terminal
  changed_when: false
  delegate_to: localhost
  become: false
  when: xhttp_enabled | default(false) | bool

- name: "Generate WSS QR code for terminal ({{ client_name }})"
  ansible.builtin.command:
    cmd: "qrencode -t ANSIUTF8 '{{ vless_wss_url }}'"
  register: wss_qr_terminal
  changed_when: false
  delegate_to: localhost
  become: false
  when: domain_mode | bool

# -- Generate QR codes as base64 PNGs for HTML --
- name: "Generate Reality QR code as base64 PNG ({{ client_name }})"
  ansible.builtin.shell:
    cmd: "printf '%s' '{{ vless_reality_url }}' | qrencode -t PNG -o - -s 6 | base64 | tr -d '\\n'"
  register: reality_qr_b64_local
  changed_when: false
  delegate_to: localhost
  become: false

- name: "Generate XHTTP QR code as base64 PNG ({{ client_name }})"
  ansible.builtin.shell:
    cmd: "printf '%s' '{{ vless_xhttp_url }}' | qrencode -t PNG -o - -s 6 | base64 | tr -d '\\n'"
  register: xhttp_qr_b64_local
  changed_when: false
  delegate_to: localhost
  become: false
  when: xhttp_enabled | default(false) | bool

- name: "Generate WSS QR code as base64 PNG ({{ client_name }})"
  ansible.builtin.shell:
    cmd: "printf '%s' '{{ vless_wss_url }}' | qrencode -t PNG -o - -s 6 | base64 | tr -d '\\n'"
  register: wss_qr_b64_local
  changed_when: false
  delegate_to: localhost
  become: false
  when: domain_mode | bool

# -- Save files locally --
# Use absolute paths so templates resolve correctly when included from other roles.
- name: "Save client connection summary ({{ client_name }})"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/roles/output/templates/connection-summary-client.txt.j2"
    dest: "{{ credentials_dir }}/{{ inventory_hostname }}-{{ client_name }}-connection-info.txt"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: "Save client connection info HTML ({{ client_name }})"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/roles/output/templates/connection-info.html.j2"
    dest: "{{ credentials_dir }}/{{ inventory_hostname }}-{{ client_name }}-connection-info.html"
    mode: "0600"
  delegate_to: localhost
  become: false

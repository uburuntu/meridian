# =============================================================================
# Exit Node Variables (chain mode)
# =============================================================================
# These defaults apply to hosts in the [exit] group when using playbook-chain.yml.
# The exit node is the German VPS that provides internet access.
# It accepts connections from the relay node AND direct user connections.
# =============================================================================

# Direct user fallback: TCP Reality inbound on a secondary port.
# Users can connect directly when the IP whitelist is not active.
reality_direct_port: 8444

# XHTTP transport settings (for relay → exit connection)
xhttp_path: "/"
xhttp_mode: "packet-up"

# =============================================================================
# Relay Node Variables (chain mode)
# =============================================================================
# These defaults apply to hosts in the [relay] group when using playbook-chain.yml.
# The relay node is a Russian VPS on a whitelisted IP that forwards traffic
# to the exit node. Users connect here with plain VLESS+TCP (no TLS needed
# for the domestic leg).
# =============================================================================

# Port the relay listens on for user connections
relay_inbound_port: 443

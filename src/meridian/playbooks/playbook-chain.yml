---
# =============================================================================
# Chain Mode: Exit Node + Relay Node
# =============================================================================
# Deploys a two-server proxy chain to bypass IP whitelisting:
#   User → Russian Relay (whitelisted IP) → German Exit → Internet
#
# Usage:
#   cp inventory-chain.yml.example inventory-chain.yml
#   # Edit with your server IPs
#   ansible-playbook -i inventory-chain.yml playbook-chain.yml
#
# The exit node is configured FIRST, then its credentials are automatically
# passed to the relay node. Re-running is safe — all tasks are idempotent.
# =============================================================================

# =============================================================================
# PLAY 1: Configure the Exit Node (Germany)
# =============================================================================
# Creates two inbounds:
#   1. VLESS+Reality+XHTTP on 443 — relay connects here
#   2. VLESS+Reality+TCP on 8444  — direct user fallback
# =============================================================================
- name: Configure exit node
  hosts: exit
  become: true
  gather_facts: true

  pre_tasks:
    - name: Fail if server IP is still the placeholder
      ansible.builtin.fail:
        msg: "Edit inventory-chain.yml and replace EXIT_SERVER_IP with your actual VPS IP."
      when: ansible_host == 'EXIT_SERVER_IP'

    - name: Resolve server public IP
      ansible.builtin.include_tasks: roles/shared/tasks/resolve_ip.yml

    - name: Check qrencode dependency
      ansible.builtin.include_tasks: roles/shared/tasks/check_qrencode.yml

    - name: Set exit mode flags
      ansible.builtin.set_fact:
        exit_mode: true
        domain_mode: "{{ domain | default('') | length > 0 }}"
        reality_port: "{{ reality_direct_port | default(8444) }}"

    - name: Load saved credentials
      ansible.builtin.include_tasks: roles/shared/tasks/load_credentials.yml

    - name: Apply saved credentials as facts
      ansible.builtin.set_fact:
        panel_username: "{{ saved_creds.panel_username }}"
        panel_password: "{{ saved_creds.panel_password }}"
        panel_web_base_path: "{{ saved_creds.panel_web_base_path }}"
        info_page_path: "{{ saved_creds.info_page_path }}"
        ws_path: "{{ saved_creds.ws_path }}"
        reality_uuid: "{{ saved_creds.reality_uuid }}"
        reality_private_key: "{{ saved_creds.reality_private_key }}"
        reality_public_key: "{{ saved_creds.reality_public_key }}"
        reality_short_id: "{{ saved_creds.reality_short_id }}"
        wss_uuid: "{{ saved_creds.wss_uuid | default('') }}"
        xhttp_uuid: "{{ saved_creds.xhttp_uuid | default('') }}"
        panel_configured: "{{ saved_creds.panel_configured | default(false) }}"
      when: creds_file_stat.stat.exists

  roles:
    - role: common
    - role: docker
    - role: xray
    - role: haproxy
      when: domain_mode | bool
    - role: caddy
      when: domain_mode | bool
    - role: output

# =============================================================================
# PLAY 2: Configure the Relay Node (Russia)
# =============================================================================
# Creates:
#   - User-facing VLESS+TCP inbound on 443 (no TLS — domestic leg)
#   - Outbound chain to exit node via VLESS+Reality+XHTTP
#   - Routing: Russian sites → direct, everything else → exit
# =============================================================================
- name: Configure relay node
  hosts: relay
  become: true
  gather_facts: true

  pre_tasks:
    - name: Fail if server IP is still the placeholder
      ansible.builtin.fail:
        msg: "Edit inventory-chain.yml and replace RELAY_SERVER_IP with your actual VPS IP."
      when: ansible_host == 'RELAY_SERVER_IP'

    - name: Fail if exit_node is not set
      ansible.builtin.fail:
        msg: >-
          The relay node must reference an exit node.
          Set exit_node: "exit_server" in your inventory for this host.
      when: exit_node is not defined or exit_node == ''

    - name: Check qrencode dependency
      ansible.builtin.include_tasks: roles/shared/tasks/check_qrencode.yml

    # -- Load exit node credentials --
    - name: Build exit node credentials file path
      ansible.builtin.set_fact:
        exit_credentials_file: "{{ credentials_dir }}/{{ exit_node }}.yml"

    - name: Check if exit node credentials exist
      ansible.builtin.stat:
        path: "{{ exit_credentials_file }}"
      register: exit_creds_stat
      delegate_to: localhost
      become: false

    - name: Fail if exit node has not been configured yet
      ansible.builtin.fail:
        msg: >-
          Exit node credentials not found at {{ exit_credentials_file }}.
          Run the playbook against the exit node first, or run without --limit
          to configure both nodes in sequence.
      when: not exit_creds_stat.stat.exists

    - name: Load exit node credentials
      ansible.builtin.include_vars:
        file: "{{ exit_credentials_file }}"
        name: exit_creds

    - name: Set exit node connection details as facts
      ansible.builtin.set_fact:
        exit_ip: "{{ hostvars[exit_node]['ansible_host'] | default(exit_creds.exit_ip | default('')) }}"
        exit_xhttp_uuid: "{{ exit_creds.xhttp_uuid }}"
        exit_public_key: "{{ exit_creds.reality_public_key }}"
        exit_short_id: "{{ exit_creds.reality_short_id }}"
        exit_reality_sni: "{{ exit_creds.reality_sni | default(reality_sni) }}"

    - name: Fail if exit XHTTP UUID is missing
      ansible.builtin.fail:
        msg: >-
          The exit node credentials file does not contain xhttp_uuid.
          Re-run the playbook against the exit node to generate it.
      when: exit_xhttp_uuid | default('') | length == 0

    # -- Set relay mode variables --
    - name: Set relay mode flags
      ansible.builtin.set_fact:
        domain_mode: false
        relay_mode: true

    # -- Load relay credentials --
    - name: Load saved credentials
      ansible.builtin.include_tasks: roles/shared/tasks/load_credentials.yml

    - name: Apply saved relay credentials as facts
      ansible.builtin.set_fact:
        panel_username: "{{ saved_creds.panel_username }}"
        panel_password: "{{ saved_creds.panel_password }}"
        panel_web_base_path: "{{ saved_creds.panel_web_base_path }}"
        relay_user_uuid: "{{ saved_creds.relay_user_uuid | default('') }}"
        panel_configured: "{{ saved_creds.panel_configured | default(false) }}"
      when: creds_file_stat.stat.exists

  roles:
    - role: common
    - role: docker
    - role: xray_relay
    - role: output_relay

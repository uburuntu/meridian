---
# =============================================================================
# Censorship-Resistant Proxy Server Setup
# =============================================================================
# Deploys VLESS+Reality (primary) and optionally VLESS+WSS+CDN (fallback)
# on a Debian/Ubuntu VPS.
#
# Usage:
#   Minimal (Reality only):  ansible-playbook playbook.yml
#   Full (with CDN fallback): ansible-playbook playbook.yml -e domain=example.com
#
# Re-running is safe — all tasks are idempotent.
# =============================================================================

- name: Deploy censorship-resistant proxy server
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    # -- Input validation --
    - name: Fail if server IP is still the placeholder
      ansible.builtin.fail:
        msg: >-
          You haven't configured your server IP yet.
          Edit inventory.yml and replace YOUR_SERVER_IP with your actual VPS IP address.
      when: ansible_host == 'YOUR_SERVER_IP'

    - name: Resolve server public IP
      ansible.builtin.include_tasks: roles/shared/tasks/resolve_ip.yml

    - name: Check qrencode dependency
      ansible.builtin.include_tasks: roles/shared/tasks/check_qrencode.yml

    # -- Compute derived variables --
    - name: Set mode flags and derived ports
      ansible.builtin.set_fact:
        domain_mode: "{{ domain | default('') | length > 0 }}"
        reality_port: >-
          {{ (domain | default('') | length > 0) | ternary(haproxy_reality_backend_port, 443) }}

    - name: Load saved credentials
      ansible.builtin.include_tasks: roles/shared/tasks/load_credentials.yml

    - name: Apply saved credentials as facts
      ansible.builtin.set_fact:
        panel_username: "{{ saved_creds.panel.username }}"
        panel_password: "{{ saved_creds.panel.password }}"
        panel_web_base_path: "{{ saved_creds.panel.web_base_path }}"
        info_page_path: "{{ saved_creds.panel.info_page_path }}"
        ws_path: "{{ saved_creds.protocols.wss.ws_path | default('') }}"
        reality_uuid: "{{ saved_creds.protocols.reality.uuid }}"
        reality_private_key: "{{ saved_creds.protocols.reality.private_key }}"
        reality_public_key: "{{ saved_creds.protocols.reality.public_key }}"
        reality_short_id: "{{ saved_creds.protocols.reality.short_id }}"
        wss_uuid: "{{ saved_creds.protocols.wss.uuid | default('') }}"
        panel_configured: "{{ saved_creds.panel_configured | default(false) }}"
      when: creds_file_stat.stat.exists

    # -- DNS pre-flight (domain mode only) --
    - name: Resolve domain DNS to check it points to this server
      ansible.builtin.command:
        cmd: "dig +short {{ domain }} @8.8.8.8"
      register: domain_dns_check
      changed_when: false
      failed_when: false
      when: domain_mode | default(false) | bool

    - name: Fail if domain does not resolve to this server
      ansible.builtin.fail:
        msg: |
          {{ domain }} does not resolve to this server's IP ({{ server_public_ip }}).
          DNS returned: {{ domain_dns_check.stdout | default('(empty)') }}

          Caddy needs the domain to point DIRECTLY to this server for TLS certificates.

          Fix: In Cloudflare, set the A record to "DNS only" (grey cloud), then re-run.
          After the playbook succeeds, switch to "Proxied" (orange cloud).

          To skip this check: add -e skip_dns_check=true
      when:
        - domain_mode | default(false) | bool
        - not (skip_dns_check | default(false) | bool)
        - domain_dns_check.stdout | default('') | trim != server_public_ip
        - domain_dns_check.stdout | default('') | trim != ''

  roles:
    - role: common
    - role: docker
    - role: xray
    - role: haproxy
      when: domain_mode | bool
    - role: caddy
      when: domain_mode | bool
    - role: output

  post_tasks:
    - name: Create server credentials directory
      ansible.builtin.file:
        path: /etc/meridian
        state: directory
        mode: "0700"

    - name: Sync credentials to server
      ansible.builtin.copy:
        src: "{{ credentials_dir }}/"
        dest: /etc/meridian/
        mode: "0600"
        directory_mode: "0700"
      no_log: true
      when: credentials_dir != '/etc/meridian'

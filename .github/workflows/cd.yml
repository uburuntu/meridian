name: CD

on:
  push:
    branches: [main]
    paths:
      - meridian
      - install.sh
      - setup.sh
      - VERSION
      - 'docs/ai/*.md'

jobs:
  sync-to-pages:
    name: Sync CLI files to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Copy files to docs/
        run: |
          cp meridian docs/meridian
          cp install.sh docs/install.sh
          cp setup.sh docs/setup.sh
          cp VERSION docs/version

      - name: Bundle AI docs
        run: |
          if [ -d docs/ai ]; then
            cat docs/ai/context.md docs/ai/architecture.md docs/ai/troubleshooting.md > docs/ai/reference.md
          fi

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/meridian docs/install.sh docs/setup.sh docs/version
          git add -f docs/ai/reference.md 2>/dev/null || true
          git commit -m "Sync CLI files to GitHub Pages [skip ci]"
          git push

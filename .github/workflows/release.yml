name: Release

on:
  workflow_run:
    workflows: [CD]
    types: [completed]

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine release type from semver
        id: semver
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
            echo "notes=Initial release" >> "$GITHUB_OUTPUT"
          else
            PREV="${PREV_TAG#v}"
            IFS='.' read -r pm pi pp <<< "$PREV"
            IFS='.' read -r cm ci cp <<< "$VERSION"
            if [ "$pm" != "$cm" ]; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif [ "$pi" != "$ci" ]; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate release notes
        id: notes
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v '\[skip ci\]')
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TYPE="${{ steps.semver.outputs.type }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Prefix based on type
          case "$TYPE" in
            major) TITLE="Meridian $VERSION" ;;
            minor) TITLE="Meridian $VERSION" ;;
            patch) TITLE="Meridian $VERSION (patch)" ;;
          esac

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md \
            $( [ "$TYPE" = "patch" ] && echo "--latest" || echo "--latest" )

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install hatchling build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

name: Release

# Triggers after CI succeeds on main.
# 1. Deploys GitHub Pages (every push)
# 2. Creates GitHub Release + publishes to PyPI (only when VERSION changes)
#
# NOTE: GitHub Pages must be configured to deploy from "GitHub Actions" source
# (Settings → Pages → Source → GitHub Actions)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Build site
        run: |
          mkdir -p _site
          # Copy docs source files
          cp -r docs/* _site/
          # Copy CLI files from root
          cp install.sh _site/install.sh
          cp setup.sh _site/setup.sh
          cp VERSION _site/version
          # Generate checksums
          cd _site
          sha256sum install.sh setup.sh > SHA256SUMS
          cd ..
          # Bundle AI docs
          if [ -d _site/ai ]; then
            cat docs/ai/context.md docs/ai/architecture.md docs/ai/troubleshooting.md > _site/ai/reference.md
          fi

      - uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine release type from semver
        id: semver
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
            echo "notes=Initial release" >> "$GITHUB_OUTPUT"
          else
            PREV="${PREV_TAG#v}"
            IFS='.' read -r pm pi pp <<< "$PREV"
            IFS='.' read -r cm ci cp <<< "$VERSION"
            if [ "$pm" != "$cm" ]; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif [ "$pi" != "$ci" ]; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate release notes
        id: notes
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create tag and release
        id: create_release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TYPE="${{ steps.semver.outputs.type }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Prefix based on type
          case "$TYPE" in
            major) TITLE="Meridian $VERSION" ;;
            minor) TITLE="Meridian $VERSION" ;;
            patch) TITLE="Meridian $VERSION (patch)" ;;
          esac

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md \
            --latest

          echo "created=true" >> "$GITHUB_OUTPUT"

    outputs:
      released: ${{ steps.create_release.outputs.created || 'false' }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install hatchling build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

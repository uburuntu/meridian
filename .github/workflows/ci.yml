name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ansible/ansible-lint@main
        with:
          requirements_file: requirements.yml

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Syntax check — all playbooks
        run: |
          ansible-playbook playbook.yml --syntax-check
          ansible-playbook -i inventory-chain.yml.example playbook-chain.yml --syntax-check
          ansible-playbook playbook-uninstall.yml --syntax-check

      - name: Shell script syntax
        run: bash -n setup.sh

      - name: Validate templates render
        run: |
          pip install jinja2
          python3 tests/render_templates.py

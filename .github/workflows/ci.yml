name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLAYBOOKS_DIR: src/meridian/playbooks

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ansible/ansible-lint@main
        with:
          working_directory: src/meridian/playbooks
          requirements_file: requirements.yml

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install ".[dev]"

      - name: Run tests (skip integration — no Docker)
        run: pytest tests/ -v --tb=short --ignore=tests/test_integration_3xui.py

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install 'ruff>=0.4,<1.0'

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Install collections
        run: ansible-galaxy collection install -r $PLAYBOOKS_DIR/requirements.yml

      - name: Syntax check — all playbooks
        run: |
          cd $PLAYBOOKS_DIR
          ansible-playbook playbook.yml --syntax-check
          ansible-playbook playbook-client.yml --syntax-check
          ansible-playbook playbook-uninstall.yml --syntax-check

      - name: Validate templates render
        run: |
          pip install jinja2
          python3 tests/render_templates.py

  shellcheck:
    name: Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check script syntax
        run: |
          bash -n install.sh
          bash -n setup.sh

      - name: Shellcheck
        run: |
          shellcheck -e SC2086,SC2029,SC2087,SC2155 -S warning install.sh
          shellcheck -e SC2086,SC2029,SC2087,SC2155 -S warning setup.sh

      - name: Verify no form-urlencoded on inbound/client APIs
        run: |
          python3 -c "
          import re, sys, glob
          errors = []
          for f in glob.glob('${{ env.PLAYBOOKS_DIR }}/roles/*/tasks/*.yml'):
              content = open(f).read()
              if 'form-urlencoded' in content and ('inbound' in content.lower() or 'client' in content.lower()):
                  blocks = content.split('ansible.builtin.uri')
                  for block in blocks[1:]:
                      chunk = block[:500]
                      if 'form-urlencoded' in chunk and ('/inbound' in chunk or '/addClient' in chunk or '/delClient' in chunk):
                          errors.append(f'{f}: body_format: form-urlencoded used with inbound/client API')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('OK: No form-urlencoded on inbound/client API calls')
          "

      - name: Verify connection-info app links are in sync
        run: |
          python3 -c "
          import re, sys
          base = '${{ env.PLAYBOOKS_DIR }}/roles'
          files = [
              f'{base}/caddy/templates/connection-info.html.j2',
              f'{base}/output/templates/connection-info.html.j2',
          ]
          def extract_links(path):
              content = open(path).read()
              return sorted(set(re.findall(r'https://(?:play\.google\.com|apps\.apple\.com|github\.com/\S+/releases)[^\s\"<]*', content)))
          baseline = extract_links(files[0])
          ok = True
          for f in files[1:]:
              links = extract_links(f)
              if links != baseline:
                  print(f'MISMATCH: {f}')
                  print(f'  Expected: {baseline}')
                  print(f'  Got:      {links}')
                  ok = False
          if ok:
              print(f'OK: App download links match across {len(files)} templates')
          else:
              sys.exit(1)
          "

      - name: Verify VERSION file format
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION file must be semver (X.Y.Z), got: $VERSION"
            exit 1
          fi
          echo "OK: VERSION=$VERSION"

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev dependencies
        run: pip install ".[dev]"

      - name: Start 3x-ui container
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for panel
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:2053/ 2>/dev/null || echo "000")
            if [ "$code" != "000" ]; then
              echo "Panel ready (HTTP $code)"
              break
            fi
            echo "Waiting... attempt $i"
            sleep 2
          done

      - name: Run integration tests
        run: pytest tests/test_integration_3xui.py -v --tb=short

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Stop container
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  dry-run:
    name: Dry Run
    runs-on: ubuntu-latest
    needs: [lint, validate]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and collections
        run: |
          pip install ansible
          ansible-galaxy collection install -r $PLAYBOOKS_DIR/requirements.yml

      - name: Ansible dry-run (standalone, no-domain)
        run: |
          cd $PLAYBOOKS_DIR
          ansible-playbook playbook.yml --check --diff \
            -e server_public_ip=127.0.0.1 \
            -e credentials_dir=/tmp/meridian \
            -c local \
            --skip-tags=requires-remote \
            2>&1 || echo "Dry run completed (failures expected in local mode)"

      - name: Ansible dry-run (uninstall)
        run: |
          cd $PLAYBOOKS_DIR
          ansible-playbook playbook-uninstall.yml --check --diff \
            -c local \
            2>&1 || echo "Dry run completed (failures expected in local mode)"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ansible/ansible-lint@main
        with:
          requirements_file: requirements.yml

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Syntax check — all playbooks
        run: |
          ansible-playbook playbook.yml --syntax-check
          ansible-playbook playbook-client.yml --syntax-check
          ansible-playbook -i inventory-chain.yml.example playbook-chain.yml --syntax-check
          ansible-playbook playbook-uninstall.yml --syntax-check

      - name: Validate templates render
        run: |
          pip install jinja2
          python3 tests/render_templates.py

  shellcheck:
    name: Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check script syntax
        run: |
          bash -n meridian
          bash -n install.sh
          bash -n setup.sh

      - name: Shellcheck
        run: |
          shellcheck -e SC2086,SC2029,SC2087 meridian || true
          shellcheck -e SC2086,SC2029,SC2087 install.sh || true
          shellcheck -e SC2086,SC2029,SC2087 setup.sh || true

      - name: Verify --help and version
        run: |
          bash meridian help
          bash meridian version

      - name: Verify VERSION file matches script
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          SCRIPT_VERSION=$(grep '^MERIDIAN_VERSION=' meridian | head -1 | cut -d'"' -f2)
          if [ "$FILE_VERSION" != "$SCRIPT_VERSION" ]; then
            echo "VERSION file ($FILE_VERSION) does not match meridian script ($SCRIPT_VERSION)"
            exit 1
          fi

  dry-run:
    name: Dry Run
    runs-on: ubuntu-latest
    needs: [lint, validate]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and collections
        run: |
          pip install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Ansible dry-run (standalone, no-domain)
        run: |
          ansible-playbook playbook.yml --check --diff \
            -e server_public_ip=127.0.0.1 \
            -e credentials_dir=/tmp/meridian \
            -c local \
            --skip-tags=requires-remote \
            2>&1 || echo "Dry run completed (failures expected in local mode)"

      - name: Ansible dry-run (uninstall)
        run: |
          ansible-playbook playbook-uninstall.yml --check --diff \
            -c local \
            2>&1 || echo "Dry run completed (failures expected in local mode)"

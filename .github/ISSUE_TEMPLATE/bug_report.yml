name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please run diagnostics:
        ```
        meridian diagnostics
        ```
        Secrets are auto-redacted. Paste the output below.

  - type: textarea
    attributes:
      label: What happened?
      description: Describe the problem. What did you expect vs. what actually happened?
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Setup mode
      options:
        - Standalone (no domain)
        - Domain mode (with Caddy + HAProxy)
        - Uninstall
        - "Not sure"
    validations:
      required: true

  - type: dropdown
    id: stage
    attributes:
      label: When does it fail?
      options:
        - During meridian setup (before Ansible runs)
        - During Ansible playbook execution
        - After setup — connection doesn't work
        - After setup — connection stopped working
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Diagnostics output
      description: Paste the output from `meridian diagnostics` here. Review it first — secrets are auto-redacted but double-check. Or run `meridian diagnostics --ai` for AI-assisted help.
      render: text
    validations:
      required: false

  - type: textarea
    attributes:
      label: Error output
      description: Paste the exact error message or Ansible task failure.
      render: text
    validations:
      required: false

  - type: input
    attributes:
      label: Server OS
      placeholder: "e.g., Ubuntu 24.04"
    validations:
      required: false

  - type: input
    attributes:
      label: Local OS
      placeholder: "e.g., macOS 15, Ubuntu 22.04"
    validations:
      required: false

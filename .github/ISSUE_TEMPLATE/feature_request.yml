name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: What would you like?
      description: Describe the feature or improvement. What problem does it solve?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Use case
      description: How would you use this? What's your setup or situation?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI (meridian)
        - Provisioning engine
        - Connection info page
        - Website (meridian.msu.rocks)
        - Documentation
        - Other
    validations:
      required: false

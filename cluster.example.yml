# cluster.example.yml — annotated reference for ~/.meridian/cluster.yml
#
# This file documents every field Meridian recognises. Drop a copy into
# ~/.meridian/cluster.yml and edit the values for your own fleet. Meridian
# always reads/writes ~/.meridian/cluster.yml; there is no flag to point it
# elsewhere at the moment.
#
# Two parts:
#   1. State (panel, nodes, relays, inbounds) — populated by `meridian deploy`,
#      `meridian node add`, etc. You generally do NOT edit these by hand.
#   2. Desired state (desired_nodes, desired_clients, desired_relays,
#      subscription_page) — written by you, read by `meridian plan` and
#      `meridian apply`. Each desired_* section is OPT-IN per resource type:
#      omitting it (or leaving it `null`) means "do not manage this category
#      declaratively". Setting it to `[]` means "manage and want zero".
#
# All IPs in this example use RFC 5737 documentation ranges (198.51.100.x).

version: 2

# ---------------------------------------------------------------------------
# Panel — populated by `meridian deploy`. Edit api_token only when rotating.
# ---------------------------------------------------------------------------
panel:
  url: https://198.51.100.1/panel-secret-path
  api_token: example-jwt-token-from-remnawave-panel
  admin_user: admin
  admin_pass: example-admin-password
  server_ip: 198.51.100.1
  ssh_user: root
  ssh_port: 22
  secret_path: panel-secret-path             # nginx reverse proxy path
  sub_path: subscription-secret-path         # subscription endpoint path
  deployed_with: 4.0.0

# Remnawave config profile + internal squad (cached after first deploy).
config_profile_uuid: 00000000-0000-0000-0000-000000000aa1
config_profile_name: meridian-default
squad_uuid: 00000000-0000-0000-0000-000000000bb2

# ---------------------------------------------------------------------------
# Nodes — actual fleet state. Updated by `meridian deploy`, `node add/remove`,
# and (if you opt in to declarative) by `meridian apply` based on desired_nodes.
# ---------------------------------------------------------------------------
nodes:
  - ip: 198.51.100.1
    uuid: 00000000-0000-0000-0000-000000000001
    name: panel-host
    ssh_user: root
    ssh_port: 22
    sni: www.microsoft.com
    domain: ""                               # set for WSS/XHTTP via Cloudflare
    is_panel_host: true                      # the node colocated with the panel
    deployed_with: 4.0.0
    xhttp_path: ""                           # auto-generated, persisted across redeploys
    ws_path: ""
    reality_public_key: ""                   # auto-generated by deploy
    reality_short_id: ""
    warp: false                              # route outbound through Cloudflare WARP

  - ip: 198.51.100.2
    uuid: 00000000-0000-0000-0000-000000000002
    name: germany-1
    ssh_user: root
    ssh_port: 22
    sni: www.cloudflare.com
    is_panel_host: false
    deployed_with: 4.0.0
    warp: false

# ---------------------------------------------------------------------------
# Relays — Realm TCP forwarders. Mapped to Remnawave Host entries.
# ---------------------------------------------------------------------------
relays:
  - ip: 198.51.100.10
    name: relay-moscow
    port: 443
    exit_node_ip: 198.51.100.2               # forwards to germany-1
    sni: www.cloudflare.com                  # camouflage SNI on the relay
    ssh_user: root
    ssh_port: 22
    host_uuids:                              # populated after first deploy
      REALITY: 00000000-0000-0000-0000-0000000000aa
      XHTTP:   00000000-0000-0000-0000-0000000000bb

# ---------------------------------------------------------------------------
# Branding — shown on connection pages.
# ---------------------------------------------------------------------------
branding:
  server_name: "Example VPN"
  icon: "🌍"
  color: ocean                               # ocean | sunset | forest | lavender | rose | slate

# ---------------------------------------------------------------------------
# Inbound cache — Remnawave inbound UUIDs by ProtocolKey. Auto-populated.
# ---------------------------------------------------------------------------
inbounds:
  reality:
    uuid: 00000000-0000-0000-0000-0000000000c1
    tag: VLESS_REALITY
  xhttp:
    uuid: 00000000-0000-0000-0000-0000000000c2
    tag: VLESS_XHTTP

# ---------------------------------------------------------------------------
# Subscription page — Remnawave subscription frontend container.
# `null` (or omitted) = not declared, do nothing.
# `enabled: true` = deploy + run; `enabled: false` after deploy = stop.
# `path` is the random nginx route generated on first deploy; persisted.
# ---------------------------------------------------------------------------
subscription_page:
  enabled: true
  path: ""                                   # auto-generated; do not pre-fill

# ---------------------------------------------------------------------------
# DESIRED STATE — read by `meridian plan` and `meridian apply`.
#
# Each desired_* section is independent. Omit the section to leave that
# category unmanaged declaratively (imperative commands still work). Use
# `[]` to declare "this category should be empty".
#
# Hybrid behaviour: when a desired_* list is non-null, `meridian client add`
# and friends mirror their effect into the matching list automatically — so
# the next `meridian apply` does not see the imperative addition as drift.
# ---------------------------------------------------------------------------

# Desired nodes — each entry maps 1:1 to a node Meridian will provision.
desired_nodes:
  - host: 198.51.100.1                       # IP of the (existing) panel-host node
    name: panel-host
    ssh_user: root
    ssh_port: 22
    domain: ""
    sni: www.microsoft.com
    # warp: false                             # omit to keep current; false = explicitly disable
  - host: 198.51.100.2
    name: germany-1
    ssh_user: root
    ssh_port: 22
    sni: www.cloudflare.com
    # warp: true                              # uncomment to route outbound through Cloudflare WARP

# Desired relays.
desired_relays:
  - host: 198.51.100.10
    name: relay-moscow
    exit_node: germany-1                     # name OR IP of an entry in desired_nodes / nodes
    sni: www.cloudflare.com
    ssh_user: root
    ssh_port: 22

# Desired clients — list of usernames that should exist in the panel.
# `[]` means "no clients should exist"; on next apply, every panel user
# would be flagged for removal (subject to --prune-extras).
desired_clients:
  - default
  - alice
  - bob
